name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - csp-app-v1-2026-03-02

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: csp-app-v1-2026-03-02
          repository: satyamdarmora/satyamYfeb20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: android

      - name: Build Production Debug APK
        run: ./gradlew assembleProductionDebug
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: csp-production-debug
          path: android/app/build/outputs/apk/production/debug/*.apk
